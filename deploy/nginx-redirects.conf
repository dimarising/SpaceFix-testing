# =============================================================================
# SpaceFix — przekierowania 301 dla zachowania pozycji SEO ze starego serwisu
# =============================================================================
#
# Serwis produkcyjny jest serwowany statycznie przez Nginx z katalogu
# /var/www/space-fix (deploy: GitHub Actions -> scp dist/*).
#
# Ten plik to snippet do wklejenia w bloku `server { ... }` konfiguracji Nginx
# domeny spacefix.pl (np. include /etc/nginx/snippets/spacefix-redirects.conf;).
#
# WAŻNE:
# 1. Nowe podstrony usług celowo mają te same slugi co stary serwis, więc
#    dla nich przekierowania NIE są potrzebne (adresy się nie zmieniły):
#       /wymiana-szybki/            (bez zmian)
#       /wymiana-wyswietlacza/      (bez zmian)
#       /wymiana-baterii/           (bez zmian)
#       /wymiana-tylnej-szyby/      (bez zmian)
#       /naprawa-zalania/           (bez zmian)
#       /naprawa-zlacza-ladowania/  (bez zmian)
#       /naprawa-plyty-glownej/     (bez zmian)
#
# 2. Poniżej uzupełnij realne stare adresy URL, które ZNIKNĘŁY lub zmieniły
#    ścieżkę. Zweryfikuj je w Google Search Console (Strony -> Zindeksowane)
#    oraz w starej mapie witryny (sitemap.xml), zanim wgrasz konfigurację.
#
# Składnia: return 301 <docelowy_url>;  (dopasowanie exact match przez `location =`)
# =============================================================================

# --- Stara strona oferty z wyborem marki/modelu -> konfigurator --------------
# (Odkomentuj i podmień ścieżkę na realną ze starego serwisu.)
# location = /oferta/            { return 301 /konfigurator/; }
# location = /wybor-modelu/      { return 301 /konfigurator/; }

# --- Usunięta podstrona „O nas” ----------------------------------------------
# (Treść „o nas” jest teraz sekcją na stronie głównej.)
location = /about/  { return 301 /; }
location = /o-nas/  { return 301 /; }

# --- Przykładowe warianty starych slugów (odkomentuj tylko jeśli istniały) ----
# location = /wyswietlacz/            { return 301 /wymiana-wyswietlacza/; }
# location = /bateria/               { return 301 /wymiana-baterii/; }
# location = /zalanie/               { return 301 /naprawa-zalania/; }
# location = /zlacze-ladowania/      { return 301 /naprawa-zlacza-ladowania/; }
# location = /plyta-glowna/          { return 301 /naprawa-plyty-glownej/; }

# --- Wymuszenie trailing slash (projekt buduje z trailingSlash: 'always') -----
# Jeśli Nginx nie dodaje sam ukośnika, pomaga to uniknąć duplikatów w indeksie:
# rewrite ^/([^.]*[^/])$ /$1/ permanent;
